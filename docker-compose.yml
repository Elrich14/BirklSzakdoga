services:
  # Optional fallback Postgres for offline / Supabase-less development.
  # Default deployment uses Supabase (DB_HOST in backend/.env). To use this
  # local DB instead, set DB_HOST=db, DB_USER=postgres, DB_PASSWORD=postgres,
  # DB_NAME=kerian in backend/.env.
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kerian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: npm run startWatch
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      # Named volume for node_modules — survives bind-mount overlay.
      # If package.json changes, run:
      #   docker compose down && docker volume rm birklszakdoga_backend_node_modules
      - backend_node_modules:/app/node_modules
    env_file: ./backend/.env

  frontend:
    build: ./frontend/kerian
    command: npm run dev
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/kerian:/app
      # Named volume for node_modules — see backend note above.
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
